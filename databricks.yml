bundle:
  name: agent_langgraph

resources:
  # MLflow experiment for agent tracing - automatically created by bundle
  experiments:
    agent_langgraph_experiment:
      name: /Users/${workspace.current_user.userName}/${bundle.name}-${bundle.target}

  apps:
    agent_langgraph:
      name: "${bundle.target}-agent-langgraph"
      description: "LangGraph agent application"
      source_code_path: ./

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "${resources.experiments.agent_langgraph_experiment.id}"
            permission: 'CAN_MANAGE'
        - name: 'sql_warehouse'
          sql_warehouse:
            id: 'f9738bf02b7d1c4f'
            permission: 'CAN_USE'
        - name: 'serving_endpoint'
          serving_endpoint:
            name: 'claude-sonnet-4-6'
            permission: 'CAN_QUERY'
        - name: 'openai_api_key'
          secret:
            scope: 'template'
            key: 'openai-api-key'
            permission: 'READ'

        # --- KA endpoints (from data/ka.list) ---
        - name: 'ka_00138eb9'
          serving_endpoint:
            name: 'ka-00138eb9-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_296a5e81'
          serving_endpoint:
            name: 'ka-296a5e81-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_4ec75e4c'
          serving_endpoint:
            name: 'ka-4ec75e4c-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_5a105383'
          serving_endpoint:
            name: 'ka-5a105383-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_5cd019a5'
          serving_endpoint:
            name: 'ka-5cd019a5-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_61806910'
          serving_endpoint:
            name: 'ka-61806910-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_64e256da'
          serving_endpoint:
            name: 'ka-64e256da-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_69061eaf'
          serving_endpoint:
            name: 'ka-69061eaf-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_7370ef1c'
          serving_endpoint:
            name: 'ka-7370ef1c-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_79b609b3'
          serving_endpoint:
            name: 'ka-79b609b3-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_aa684c1e'
          serving_endpoint:
            name: 'ka-aa684c1e-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_b0fdac6d'
          serving_endpoint:
            name: 'ka-b0fdac6d-endpoint'
