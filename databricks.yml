            permission: 'CAN_QUERY'
        # --- end KA endpoints ---
        - name: 'genie_trading'
          genie_space:
            name: 'EDF TRADING'
            space_id: '01f125ff96d61121a20aab6e7d0b080d'
            permission: 'CAN_RUN'

targets:
  dev:
    mode: development
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_langgraph:
          name: agent-langgraph

  # Default target (DBX_APP_NAME in .env.local)
  # Use: databricks bundle deploy  (no -t needed) or ./deploy/deploy.sh
  template:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/template
    resources:
      apps:
        agent_langgraph:
          name: agent-langgraph
