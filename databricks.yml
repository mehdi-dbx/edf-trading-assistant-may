bundle:
  name: agent_edf_trading_assistant

resources:
  # MLflow experiment for agent tracing - automatically created by bundle
  experiments:
    agent_edf_trading_assistant_experiment:
      name: /Users/${workspace.current_user.userName}/${bundle.name}-${bundle.target}

  apps:
    agent_edf_trading_assistant:
      name: "${bundle.target}-agent-edf-trading-assistant"
      description: "LangGraph agent application"
      source_code_path: ./

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "${resources.experiments.agent_edf_trading_assistant_experiment.id}"
            permission: 'CAN_MANAGE'
        - name: 'sql_warehouse'
          sql_warehouse:
            id: '5fab259c214f158e'
            permission: 'CAN_USE'
        - name: 'serving_endpoint'
          serving_endpoint:
            name: 'databricks-claude-sonnet-4-6'
            permission: 'CAN_QUERY'
        # OpenAI secret for voice: add OPENAI_API_KEY to .env.local, run ./deploy/setup_openai_secret.sh, then uncomment:
        # - name: 'openai_api_key'
        #   secret:
        #     scope: 'template'
        #     key: 'openai-ap`i-key'
        #     permission: 'READ'

        # --- KA endpoints (from data/ka.list) ---
        - name: 'ka_02272bf7'
          serving_endpoint:
            name: 'ka-02272bf7-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_17df95e6'
          serving_endpoint:
            name: 'ka-17df95e6-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_279c2e24'
          serving_endpoint:
            name: 'ka-279c2e24-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_409508df'
          serving_endpoint:
            name: 'ka-409508df-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_7597b13d'
          serving_endpoint:
            name: 'ka-7597b13d-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_7a682a22'
          serving_endpoint:
            name: 'ka-7a682a22-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_91765c48'
          serving_endpoint:
            name: 'ka-91765c48-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_94be15a3'
          serving_endpoint:
            name: 'ka-94be15a3-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_b3e5b903'
          serving_endpoint:
            name: 'ka-b3e5b903-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_bdea1d75'
          serving_endpoint:
            name: 'ka-bdea1d75-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_c887ed34'
          serving_endpoint:
            name: 'ka-c887ed34-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_d4972e01'
          serving_endpoint:
            name: 'ka-d4972e01-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_db468426'
          serving_endpoint:
            name: 'ka-db468426-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_e507f805'
          serving_endpoint:
            name: 'ka-e507f805-endpoint'
            permission: 'CAN_QUERY'
        - name: 'ka_e77484a5'
          serving_endpoint:
            name: 'ka-e77484a5-endpoint'
            permission: 'CAN_QUERY'
        # --- end KA endpoints ---
        - name: 'genie_trading'
          genie_space:
            name: 'EDF TRADING'
            space_id: '01f12af979b51f8c90cb6f5aa2d50416'
            permission: 'CAN_RUN'

targets:
  dev:
    mode: development
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_edf_trading_assistant:
          name: agent-edf-trading-assistant

  # Default target (DBX_APP_NAME in .env.local)
  # Use: databricks bundle deploy  (no -t needed) or ./deploy/deploy.sh
  template:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/template
    resources:
      apps:
        agent_edf_trading_assistant:
          name: agent-edf-trading-assistant
