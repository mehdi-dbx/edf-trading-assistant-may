bundle:
  name: agent_langgraph

resources:
  # MLflow experiment for agent tracing - automatically created by bundle
  experiments:
    agent_langgraph_experiment:
      name: /Users/${workspace.current_user.userName}/${bundle.name}-${bundle.target}

  apps:
    agent_langgraph:
      name: "${bundle.target}-agent-langgraph"
      description: "LangGraph agent application"
      source_code_path: ./

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "${resources.experiments.agent_langgraph_experiment.id}"
            permission: 'CAN_MANAGE'
        - name: 'sql_warehouse'
          sql_warehouse:
            id: 'f9738bf02b7d1c4f'
            permission: 'CAN_USE'
        - name: 'genie_checkin'
          genie_space:
            name: 'AMADEUS CHECKIN'
            space_id: '01f11afee6f211559a00ef8d9c36d468'
            permission: 'CAN_RUN'
        - name: 'serving_endpoint'
          serving_endpoint:
            name: 'claude-sonnet-4-6'
            permission: 'CAN_QUERY'
        - name: 'openai_api_key'
          secret:
            scope: 'amadeus-checkin'
            key: 'openai-api-key'
            permission: 'READ'

targets:
  dev:
    mode: development
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_langgraph:
          name: agent-langgraph

  # Default target: agent-airops-checkin (DBX_APP_NAME in .env.local)
  # Use: databricks bundle deploy  (no -t needed) or ./deploy/deploy.sh
  airops-checkin:
    mode: production
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/airops-checkin
    resources:
      apps:
        agent_langgraph:
          name: agent-airops-checkin
