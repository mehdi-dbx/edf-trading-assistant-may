<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Performance Report</title>
  <style>
    @page { margin: 2cm; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #222;
      background: #fff;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }
    .header img {
      height: 48px;
      width: auto;
    }
    .header h1 { margin: 0; font-size: 1.25rem; }
    .header .date { color: #666; font-size: 0.9rem; }
    .summary {
      background: #f8f9fa;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .summary h2 { margin-top: 0; font-size: 1rem; }
    .section {
      margin-bottom: 1.5rem;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 1rem;
    }
    .section h2 { margin-top: 0; font-size: 1rem; }
    .metrics table {
      width: 100%;
      border-collapse: collapse;
    }
    .metrics th, .metrics td {
      text-align: left;
      padding: 0.5rem;
      border-bottom: 1px solid #eee;
    }
    .metrics th { color: #666; font-weight: 500; }
    footer {
      margin-top: 2rem;
      padding-top: 0.5rem;
      border-top: 1px solid #ddd;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header class="header">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" alt="Logo" />
    <div>
      <h1>Acme Airlines</h1>
      <span class="date">Generated: 2026-02-18 17:09 UTC</span>
    </div>
  </header>

  <section class="summary">
    <h2>Summary</h2>
    <p>Check-in performance overview for Q1.</p>
  </section>

  
  <section class="section">
    <h2>By airline</h2>
    <p>Table and analysis here.</p>
  </section>
  

  <section class="metrics">
    <h2>Metrics</h2>
    <table>
      
      <tr><th>total_checkins</th><td>15000</td></tr>
      
      <tr><th>avg_sla_pct</th><td>93.5</td></tr>
      
    </table>
  </section>

  <footer>
    Report generated by Performance Reports Agent — Page <span class="page"></span>
  </footer>
</body>
</html>
